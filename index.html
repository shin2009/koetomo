<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<meta name="theme-color" content="#1a5632">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KoeTomo">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>KoeTomo - 声とも</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --green-deep: #1a5632;
  --green-main: #2d8a56;
  --green-light: #4db87a;
  --green-pale: #e8f5ee;
  --green-glow: #6fdd9a;
  --cream: #faf8f3;
  --warm-white: #fffefa;
  --text-dark: #1a1a1a;
  --text-mid: #4a4a4a;
  --text-light: #8a8a8a;
  --red-stop: #d94848;
  --red-hover: #c03030;
  --orange-warn: #e8a040;
  --shadow-soft: 0 2px 16px rgba(26, 86, 50, 0.12);
  --shadow-lg: 0 8px 32px rgba(26, 86, 50, 0.18);
  --radius: 20px;
  --radius-sm: 12px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html {
  font-size: 18px;
  scroll-behavior: smooth;
}

body {
  font-family: 'Zen Maru Gothic', 'Noto Sans JP', sans-serif;
  background: var(--cream);
  color: var(--text-dark);
  min-height: 100dvh;
  overflow-x: hidden;
  position: relative;
}

/* Background texture */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(ellipse at 20% 0%, rgba(45, 138, 86, 0.06) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(45, 138, 86, 0.04) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* ===== HEADER ===== */
.header {
  background: linear-gradient(135deg, var(--green-deep) 0%, var(--green-main) 100%);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 20px rgba(26, 86, 50, 0.25);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: rgba(255,255,255,0.2);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}

.logo-text {
  color: white;
  font-weight: 900;
  font-size: 1.3rem;
  letter-spacing: 0.02em;
}

.logo-sub {
  color: rgba(255,255,255,0.7);
  font-size: 0.7rem;
  font-weight: 400;
}

.lang-toggle {
  background: rgba(255,255,255,0.18);
  border: 2px solid rgba(255,255,255,0.3);
  color: white;
  padding: 8px 16px;
  border-radius: 50px;
  font-size: 0.85rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}

.lang-toggle:hover, .lang-toggle:active {
  background: rgba(255,255,255,0.3);
}

/* ===== STATUS BAR ===== */
.status-bar {
  background: var(--warm-white);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid rgba(45, 138, 86, 0.1);
  font-size: 0.85rem;
  color: var(--text-mid);
  position: relative;
  z-index: 1;
}

.status-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--text-light);
  flex-shrink: 0;
  transition: background 0.3s;
}

.status-dot.active {
  background: var(--green-light);
  box-shadow: 0 0 8px rgba(77, 184, 122, 0.6);
  animation: pulse-dot 1.5s ease-in-out infinite;
}

.status-dot.error {
  background: var(--red-stop);
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.status-text {
  flex: 1;
}

.status-lang {
  background: var(--green-pale);
  color: var(--green-deep);
  padding: 4px 12px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 0.8rem;
}

/* ===== MAIN CONTENT ===== */
.main {
  padding: 20px;
  padding-bottom: 200px;
  position: relative;
  z-index: 1;
}

/* ===== INSTRUCTION CARD ===== */
.instruction-card {
  background: white;
  border-radius: var(--radius);
  padding: 28px 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-soft);
  border: 1px solid rgba(45, 138, 86, 0.08);
}

.instruction-title {
  font-size: 1.1rem;
  font-weight: 900;
  color: var(--green-deep);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.instruction-steps {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.step {
  display: flex;
  align-items: flex-start;
  gap: 14px;
}

.step-num {
  width: 32px;
  height: 32px;
  background: var(--green-pale);
  color: var(--green-main);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: 0.9rem;
  flex-shrink: 0;
}

.step-text {
  font-size: 1rem;
  line-height: 1.6;
  color: var(--text-mid);
  padding-top: 3px;
}

.step-text strong {
  color: var(--text-dark);
}

/* ===== TRANSCRIPT AREA ===== */
.transcript-container {
  background: white;
  border-radius: var(--radius);
  min-height: 300px;
  box-shadow: var(--shadow-soft);
  border: 1px solid rgba(45, 138, 86, 0.08);
  overflow: hidden;
  display: none;
}

.transcript-container.visible {
  display: block;
}

.transcript-header {
  padding: 16px 20px;
  border-bottom: 1px solid rgba(45, 138, 86, 0.1);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.transcript-title {
  font-weight: 700;
  color: var(--green-deep);
  font-size: 0.95rem;
}

.transcript-actions {
  display: flex;
  gap: 8px;
}

.action-btn {
  background: var(--green-pale);
  border: none;
  color: var(--green-deep);
  width: 36px;
  height: 36px;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  transition: all 0.2s;
  font-family: inherit;
}

.action-btn:hover, .action-btn:active {
  background: var(--green-main);
  color: white;
}

.transcript-body {
  padding: 20px;
  max-height: 55vh;
  overflow-y: auto;
  scroll-behavior: smooth;
}

.transcript-line {
  padding: 10px 16px;
  margin-bottom: 8px;
  border-radius: var(--radius-sm);
  font-size: 1.35rem;
  line-height: 1.8;
  color: var(--text-dark);
  animation: fadeInUp 0.3s ease;
  word-break: break-word;
}

.transcript-line.final {
  background: var(--green-pale);
  border-left: 4px solid var(--green-main);
}

.transcript-line.interim {
  background: #f5f5f0;
  border-left: 4px solid var(--orange-warn);
  color: var(--text-mid);
  font-style: italic;
}

.transcript-line .timestamp {
  display: block;
  font-size: 0.65rem;
  color: var(--text-light);
  margin-top: 4px;
  font-style: normal;
}

.transcript-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-light);
}

.transcript-empty .empty-icon {
  font-size: 3rem;
  margin-bottom: 12px;
  opacity: 0.4;
}

.transcript-empty p {
  font-size: 1rem;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== FONT SIZE CONTROL ===== */
.font-control {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-top: 16px;
  display: none;
}

.font-control.visible {
  display: flex;
}

.font-btn {
  background: white;
  border: 2px solid var(--green-main);
  color: var(--green-main);
  width: 48px;
  height: 48px;
  border-radius: 14px;
  font-size: 1.3rem;
  font-weight: 900;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  font-family: inherit;
}

.font-btn:hover, .font-btn:active {
  background: var(--green-main);
  color: white;
}

.font-label {
  font-size: 0.85rem;
  color: var(--text-mid);
  min-width: 60px;
  text-align: center;
}

/* ===== HISTORY SECTION ===== */
.history-section {
  margin-top: 24px;
  display: none;
}

.history-section.visible {
  display: block;
}

.history-title {
  font-size: 1rem;
  font-weight: 700;
  color: var(--green-deep);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.history-item {
  background: white;
  border-radius: var(--radius-sm);
  padding: 16px;
  margin-bottom: 10px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.05);
  cursor: pointer;
  transition: all 0.2s;
  border: 1px solid rgba(45, 138, 86, 0.06);
}

.history-item:hover, .history-item:active {
  box-shadow: var(--shadow-soft);
  border-color: var(--green-main);
}

.history-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.history-date {
  font-size: 0.8rem;
  color: var(--text-light);
  font-weight: 700;
}

.history-delete {
  background: none;
  border: none;
  color: var(--text-light);
  cursor: pointer;
  font-size: 1rem;
  padding: 4px;
  font-family: inherit;
}

.history-preview {
  font-size: 0.9rem;
  color: var(--text-mid);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ===== HISTORY DETAIL MODAL ===== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  animation: fadeIn 0.2s;
}

.modal-overlay.visible {
  display: block;
}

.modal {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: white;
  border-radius: var(--radius) var(--radius) 0 0;
  max-height: 80vh;
  overflow-y: auto;
  z-index: 201;
  padding: 24px 20px;
  display: none;
  animation: slideUp 0.3s ease;
}

.modal.visible {
  display: block;
}

.modal-close {
  background: var(--green-pale);
  border: none;
  color: var(--green-deep);
  width: 40px;
  height: 40px;
  border-radius: 12px;
  font-size: 1.2rem;
  cursor: pointer;
  float: right;
  font-family: inherit;
}

.modal-title {
  font-size: 1rem;
  font-weight: 700;
  color: var(--green-deep);
  margin-bottom: 16px;
}

.modal-content {
  font-size: 1.1rem;
  line-height: 1.9;
  color: var(--text-dark);
}

.modal-content .line {
  padding: 8px 0;
  border-bottom: 1px solid rgba(0,0,0,0.04);
}

.modal-content .line-time {
  font-size: 0.7rem;
  color: var(--text-light);
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

/* ===== BOTTOM CONTROLS ===== */
.bottom-controls {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 20px;
  padding-bottom: max(20px, env(safe-area-inset-bottom));
  background: linear-gradient(transparent, var(--cream) 30%);
  z-index: 50;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

.start-btn {
  width: 100%;
  max-width: 400px;
  padding: 22px 32px;
  border: none;
  border-radius: 60px;
  font-size: 1.3rem;
  font-weight: 900;
  cursor: pointer;
  transition: all 0.3s;
  font-family: inherit;
  letter-spacing: 0.03em;
  position: relative;
  overflow: hidden;
}

.start-btn.ready {
  background: linear-gradient(135deg, var(--green-main) 0%, var(--green-light) 100%);
  color: white;
  box-shadow: 0 6px 24px rgba(45, 138, 86, 0.35);
}

.start-btn.ready:hover, .start-btn.ready:active {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(45, 138, 86, 0.45);
}

.start-btn.listening {
  background: linear-gradient(135deg, var(--red-stop) 0%, #e06060 100%);
  color: white;
  box-shadow: 0 6px 24px rgba(217, 72, 72, 0.35);
  animation: pulse-btn 2s ease-in-out infinite;
}

@keyframes pulse-btn {
  0%, 100% { box-shadow: 0 6px 24px rgba(217, 72, 72, 0.35); }
  50% { box-shadow: 0 6px 32px rgba(217, 72, 72, 0.55); }
}

.start-btn.listening:hover, .start-btn.listening:active {
  transform: translateY(-2px);
}

.start-btn .btn-icon {
  margin-right: 8px;
}

.hint-text {
  font-size: 0.75rem;
  color: var(--text-light);
  text-align: center;
}

/* ===== SOUND WAVE ANIMATION ===== */
.sound-wave {
  display: none;
  align-items: center;
  justify-content: center;
  gap: 3px;
  height: 24px;
  margin-right: 8px;
}

.sound-wave.active {
  display: inline-flex;
}

.sound-wave .bar {
  width: 3px;
  background: white;
  border-radius: 2px;
  animation: wave 1s ease-in-out infinite;
}

.sound-wave .bar:nth-child(1) { height: 8px; animation-delay: 0s; }
.sound-wave .bar:nth-child(2) { height: 16px; animation-delay: 0.15s; }
.sound-wave .bar:nth-child(3) { height: 12px; animation-delay: 0.3s; }
.sound-wave .bar:nth-child(4) { height: 20px; animation-delay: 0.45s; }
.sound-wave .bar:nth-child(5) { height: 10px; animation-delay: 0.6s; }

@keyframes wave {
  0%, 100% { transform: scaleY(0.5); }
  50% { transform: scaleY(1.2); }
}

/* ===== RESPONSIVE ===== */
@media (max-width: 380px) {
  html { font-size: 16px; }
  .header { padding: 12px 16px; }
  .main { padding: 16px; }
  .transcript-line { font-size: 1.2rem; }
}

@media (min-width: 768px) {
  .main { max-width: 640px; margin: 0 auto; }
  .bottom-controls { max-width: 640px; left: 50%; transform: translateX(-50%); }
}

/* ===== PWA install prompt ===== */
.install-banner {
  display: none;
  background: linear-gradient(135deg, var(--green-deep), var(--green-main));
  color: white;
  padding: 14px 20px;
  align-items: center;
  gap: 12px;
  position: relative;
  z-index: 1;
}

.install-banner.visible {
  display: flex;
}

.install-banner p {
  flex: 1;
  font-size: 0.85rem;
  line-height: 1.4;
}

.install-btn {
  background: white;
  color: var(--green-deep);
  border: none;
  padding: 8px 18px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 0.85rem;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
}

.install-dismiss {
  background: none;
  border: none;
  color: rgba(255,255,255,0.7);
  font-size: 1.2rem;
  cursor: pointer;
  padding: 4px;
  font-family: inherit;
}

/* ===== NOISE GATE INDICATOR ===== */
.noise-gate-bar {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 8px 20px;
  background: var(--warm-white);
  border-bottom: 1px solid rgba(45, 138, 86, 0.1);
  font-size: 0.75rem;
  color: var(--text-mid);
  position: relative;
  z-index: 1;
}

.noise-gate-bar.visible {
  display: flex;
}

.noise-gate-bar label {
  white-space: nowrap;
  font-weight: 700;
  font-size: 0.75rem;
}

.volume-meter-container {
  flex: 1;
  height: 8px;
  background: #e8e8e4;
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}

.volume-meter-fill {
  height: 100%;
  width: 0%;
  background: var(--green-light);
  border-radius: 4px;
  transition: width 0.1s;
}

.volume-meter-fill.loud {
  background: var(--green-main);
}

.volume-meter-fill.quiet {
  background: var(--text-light);
}

.threshold-line {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--red-stop);
  z-index: 1;
}

.sensitivity-control {
  display: flex;
  align-items: center;
  gap: 6px;
}

.sensitivity-btn {
  background: var(--green-pale);
  border: 1px solid rgba(45, 138, 86, 0.2);
  color: var(--green-deep);
  width: 28px;
  height: 28px;
  border-radius: 8px;
  font-size: 0.85rem;
  font-weight: 900;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: inherit;
}

.sensitivity-btn:active {
  background: var(--green-main);
  color: white;
}

.sensitivity-label {
  font-size: 0.7rem;
  min-width: 20px;
  text-align: center;
  font-weight: 700;
  color: var(--green-deep);
}

/* Unsupported browser notice */
.unsupported-notice {
  display: none;
  background: #fff3e0;
  border: 2px solid var(--orange-warn);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 20px;
  text-align: center;
}

.unsupported-notice.visible {
  display: block;
}

.unsupported-notice p {
  font-size: 0.95rem;
  color: var(--text-mid);
  line-height: 1.6;
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="logo">
    <div class="logo-icon">👂</div>
    <div>
      <div class="logo-text">KoeTomo</div>
      <div class="logo-sub" data-i18n="subtitle">声をつなぐ、心をつなぐ</div>
    </div>
  </div>
  <button class="lang-toggle" id="langToggle" onclick="toggleLanguage()">EN</button>
</header>

<!-- PWA Install Banner -->
<div class="install-banner" id="installBanner">
  <p data-i18n="installPrompt">ホーム画面に追加すると、アプリのように使えます</p>
  <button class="install-btn" onclick="installPWA()" data-i18n="installBtn">追加する</button>
  <button class="install-dismiss" onclick="dismissInstall()">✕</button>
</div>

<!-- Status Bar -->
<div class="status-bar">
  <div class="status-dot" id="statusDot"></div>
  <span class="status-text" id="statusText" data-i18n="statusReady">マイクの準備ができています</span>
  <span class="status-lang" id="statusLang">日本語</span>
</div>

<!-- Noise Gate Bar -->
<div class="noise-gate-bar" id="noiseGateBar">
  <label data-i18n="noiseGateLabel">🔇 感度</label>
  <div class="volume-meter-container">
    <div class="threshold-line" id="thresholdLine" style="left: 15%"></div>
    <div class="volume-meter-fill" id="volumeMeter"></div>
  </div>
  <div class="sensitivity-control">
    <button class="sensitivity-btn" onclick="adjustThreshold(-5)">−</button>
    <span class="sensitivity-label" id="sensitivityLabel">中</span>
    <button class="sensitivity-btn" onclick="adjustThreshold(5)">＋</button>
  </div>
</div>

<!-- Main Content -->
<main class="main">

  <!-- Unsupported Notice -->
  <div class="unsupported-notice" id="unsupportedNotice">
    <p>⚠️ <span data-i18n="unsupported">お使いのブラウザは音声認識に対応していません。Chrome または Safari をお使いください。</span></p>
  </div>

  <!-- Instruction Card -->
  <div class="instruction-card" id="instructionCard">
    <div class="instruction-title">
      📋 <span data-i18n="howToUse">つかいかた</span>
    </div>
    <div class="instruction-steps">
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-text" data-i18n="step1">電話を<strong>スピーカーフォン</strong>にする</div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-text" data-i18n="step2">下の<strong>「聞きとり開始」</strong>ボタンを押す</div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-text" data-i18n="step3">相手の声が<strong>文字で表示</strong>されます</div>
      </div>
    </div>
  </div>

  <!-- Transcript Area -->
  <div class="transcript-container" id="transcriptContainer">
    <div class="transcript-header">
      <span class="transcript-title" data-i18n="transcriptTitle">📝 会話の内容</span>
      <div class="transcript-actions">
        <button class="action-btn" onclick="copyTranscript()" title="コピー">📋</button>
        <button class="action-btn" onclick="clearTranscript()" title="クリア">🗑️</button>
      </div>
    </div>
    <div class="transcript-body" id="transcriptBody">
      <div class="transcript-empty" id="transcriptEmpty">
        <div class="empty-icon">🎙️</div>
        <p data-i18n="waitingVoice">音声を待っています...</p>
      </div>
    </div>
  </div>

  <!-- Font Size Control -->
  <div class="font-control" id="fontControl">
    <button class="font-btn" onclick="changeFontSize(-1)">A-</button>
    <span class="font-label" id="fontLabel">中</span>
    <button class="font-btn" onclick="changeFontSize(1)">A+</button>
  </div>

  <!-- History Section -->
  <div class="history-section" id="historySection">
    <div class="history-title">
      📁 <span data-i18n="historyTitle">保存された会話</span>
    </div>
    <div id="historyList"></div>
  </div>

</main>

<!-- Bottom Controls -->
<div class="bottom-controls">
  <button class="start-btn ready" id="startBtn" onclick="toggleListening()">
    <span class="btn-icon">🎙️</span>
    <span data-i18n="startBtn">聞きとり開始</span>
  </button>
  <div class="hint-text" data-i18n="hint">通話中にスピーカーフォンにしてお使いください</div>
</div>

<!-- History Detail Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
<div class="modal" id="modal">
  <button class="modal-close" onclick="closeModal()">✕</button>
  <div class="modal-title" id="modalTitle"></div>
  <div class="modal-content" id="modalContent"></div>
</div>

<script>
// ===== i18n =====
const i18n = {
  ja: {
    subtitle: '声をつなぐ、心をつなぐ',
    statusReady: 'マイクの準備ができています',
    statusListening: '聞きとり中...',
    statusStopped: '停止しました',
    statusError: 'エラーが発生しました',
    statusNoPermission: 'マイクの許可が必要です',
    howToUse: 'つかいかた',
    step1: '電話を<strong>スピーカーフォン</strong>にする',
    step2: '下の<strong>「聞きとり開始」</strong>ボタンを押す',
    step3: '相手の声が<strong>文字で表示</strong>されます',
    transcriptTitle: '📝 会話の内容',
    waitingVoice: '音声を待っています...',
    startBtn: '聞きとり開始',
    stopBtn: '停止する',
    hint: '通話中にスピーカーフォンにしてお使いください',
    historyTitle: '保存された会話',
    installPrompt: 'ホーム画面に追加すると、アプリのように使えます',
    installBtn: '追加する',
    unsupported: 'お使いのブラウザは音声認識に対応していません。Chrome または Safari をお使いください。',
    fontSmall: '小',
    fontMedium: '中',
    fontLarge: '大',
    fontXLarge: '特大',
    copied: 'コピーしました！',
    cleared: '会話をクリアしました',
    saved: '会話を保存しました',
    langLabel: '日本語',
    noiseGateLabel: '🔇 感度',
    confirmClear: '会話内容をクリアしますか？',
    confirmDelete: 'この会話を削除しますか？',
  },
  en: {
    subtitle: 'Connecting voices, connecting hearts',
    statusReady: 'Microphone ready',
    statusListening: 'Listening...',
    statusStopped: 'Stopped',
    statusError: 'An error occurred',
    statusNoPermission: 'Microphone permission required',
    howToUse: 'How to Use',
    step1: 'Put your phone on <strong>speaker</strong>',
    step2: 'Press the <strong>"Start Listening"</strong> button below',
    step3: 'The caller\'s voice will appear as <strong>text</strong>',
    transcriptTitle: '📝 Conversation',
    waitingVoice: 'Waiting for voice...',
    startBtn: 'Start Listening',
    stopBtn: 'Stop',
    hint: 'Use with speakerphone during a call',
    historyTitle: 'Saved Conversations',
    installPrompt: 'Add to home screen to use like an app',
    installBtn: 'Add',
    unsupported: 'Your browser does not support speech recognition. Please use Chrome or Safari.',
    fontSmall: 'S',
    fontMedium: 'M',
    fontLarge: 'L',
    fontXLarge: 'XL',
    copied: 'Copied!',
    cleared: 'Conversation cleared',
    saved: 'Conversation saved',
    langLabel: 'English',
    noiseGateLabel: '🔇 Sensitivity',
    confirmClear: 'Clear the conversation?',
    confirmDelete: 'Delete this conversation?',
  }
};

let currentLang = 'ja';
let recognitionLang = 'ja-JP';

function toggleLanguage() {
  currentLang = currentLang === 'ja' ? 'en' : 'ja';
  recognitionLang = currentLang === 'ja' ? 'ja-JP' : 'en-US';
  
  document.getElementById('langToggle').textContent = currentLang === 'ja' ? 'EN' : 'JA';
  document.getElementById('statusLang').textContent = i18n[currentLang].langLabel;
  
  // Update all i18n elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (i18n[currentLang][key]) {
      el.innerHTML = i18n[currentLang][key];
    }
  });
  
  // Update button text based on state
  updateButtonText();
  updateFontLabel();
  
  // Restart recognition with new language if listening
  if (isListening && recognition) {
    recognition.lang = recognitionLang;
    try {
      recognition.stop();
      setTimeout(() => {
        if (isListening) recognition.start();
      }, 300);
    } catch(e) {}
  }
}

// ===== Speech Recognition =====
let recognition = null;
let isListening = false;
let transcriptLines = [];
let interimElement = null;

// ===== Noise Gate (Web Audio API) =====
let audioContext = null;
let analyser = null;
let micStream = null;
let noiseGateActive = false;
let currentVolume = 0;
let volumeThreshold = 15; // 0-100, default 15%
let isVoiceDetected = false;
let volumeAnimFrame = null;

const sensitivityLevels = {
  ja: { 5: '高', 10: '中高', 15: '中', 25: '中低', 35: '低' },
  en: { 5: 'High', 10: 'Med+', 15: 'Med', 25: 'Med-', 35: 'Low' }
};

async function initNoiseGate() {
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioContext.createMediaStreamSource(micStream);
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 512;
    analyser.smoothingTimeConstant = 0.4;
    source.connect(analyser);
    
    noiseGateActive = true;
    monitorVolume();
    document.getElementById('noiseGateBar').classList.add('visible');
    updateThresholdUI();
    return true;
  } catch(e) {
    console.warn('Noise gate init failed:', e);
    return false;
  }
}

function monitorVolume() {
  if (!noiseGateActive || !analyser) return;
  
  const dataArray = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(dataArray);
  
  // Calculate RMS volume (focus on voice frequency range ~300-3000Hz)
  const sampleRate = audioContext.sampleRate;
  const binSize = sampleRate / analyser.fftSize;
  const startBin = Math.floor(300 / binSize);
  const endBin = Math.min(Math.floor(3000 / binSize), dataArray.length);
  
  let sum = 0;
  let count = 0;
  for (let i = startBin; i < endBin; i++) {
    sum += dataArray[i] * dataArray[i];
    count++;
  }
  
  const rms = count > 0 ? Math.sqrt(sum / count) : 0;
  currentVolume = Math.min(100, (rms / 255) * 150); // Normalize to 0-100
  
  isVoiceDetected = currentVolume > volumeThreshold;
  
  // Update volume meter UI
  const meter = document.getElementById('volumeMeter');
  if (meter) {
    meter.style.width = currentVolume + '%';
    meter.className = 'volume-meter-fill' + (isVoiceDetected ? ' loud' : ' quiet');
  }
  
  volumeAnimFrame = requestAnimationFrame(monitorVolume);
}

function adjustThreshold(delta) {
  volumeThreshold = Math.max(5, Math.min(35, volumeThreshold + delta));
  updateThresholdUI();
}

function updateThresholdUI() {
  const line = document.getElementById('thresholdLine');
  const label = document.getElementById('sensitivityLabel');
  
  if (line) line.style.left = volumeThreshold + '%';
  
  if (label) {
    const levels = sensitivityLevels[currentLang];
    // Find closest level
    const keys = Object.keys(levels).map(Number).sort((a, b) => a - b);
    let closest = keys[0];
    for (const k of keys) {
      if (Math.abs(k - volumeThreshold) <= Math.abs(closest - volumeThreshold)) {
        closest = k;
      }
    }
    label.textContent = levels[closest];
  }
}

function stopNoiseGate() {
  noiseGateActive = false;
  if (volumeAnimFrame) cancelAnimationFrame(volumeAnimFrame);
  if (audioContext && audioContext.state !== 'closed') {
    audioContext.close().catch(() => {});
  }
  if (micStream) {
    micStream.getTracks().forEach(track => track.stop());
    micStream = null;
  }
  document.getElementById('noiseGateBar').classList.remove('visible');
}

// ===== Confidence & Noise Filtering =====
function isLikelyNoise(text, confidence) {
  // Filter by confidence score (if available)
  if (confidence < 0.5) return true;
  
  // Filter very short meaningless text
  const cleaned = text.trim();
  if (cleaned.length <= 1) return true;
  
  // Filter repetitive single characters (music artifacts like "ああああ", "ラララ")
  if (/^(.)\1{3,}$/.test(cleaned)) return true;
  
  // Filter common music recognition artifacts
  const musicPatterns = [
    /^[ふはあうおんーっ]{1,4}$/,
    /^(ラ|ル|リ|レ|ロ|ダ|パ|タ|ナ){2,}$/,
    /^(la|na|da|ba|pa|ta){2,}$/i,
    /^(oh|ah|ooh|yeah|hmm){1,3}$/i,
  ];
  
  for (const pattern of musicPatterns) {
    if (pattern.test(cleaned)) return true;
  }
  
  return false;
}

function initRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  
  if (!SpeechRecognition) {
    document.getElementById('unsupportedNotice').classList.add('visible');
    document.getElementById('startBtn').disabled = true;
    document.getElementById('startBtn').style.opacity = '0.5';
    return;
  }
  
  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = recognitionLang;
  recognition.maxAlternatives = 1;
  
  recognition.onstart = () => {
    isListening = true;
    updateUI();
  };
  
  recognition.onresult = (event) => {
    let interimTranscript = '';
    
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const result = event.results[i];
      const text = result[0].transcript;
      const confidence = result[0].confidence || 0.9;
      
      if (result.isFinal) {
        // Confidence & pattern filter (catches music artifacts)
        if (isLikelyNoise(text, confidence)) {
          console.log('Noise filtered (pattern/confidence):', text, confidence);
          removeInterim();
          continue;
        }
        
        // Noise gate: only filter if volume is very clearly below threshold
        // Use a lenient check - voice may have already faded by the time result arrives
        if (noiseGateActive && currentVolume < volumeThreshold * 0.3) {
          console.log('Noise gate filtered (very low volume):', text, currentVolume);
          removeInterim();
          continue;
        }
        
        addTranscriptLine(text, true);
        removeInterim();
      } else {
        interimTranscript += text;
      }
    }
    
    if (interimTranscript) {
      showInterim(interimTranscript);
    }
  };
  
  recognition.onerror = (event) => {
    console.log('Speech recognition error:', event.error);
    
    if (event.error === 'not-allowed') {
      setStatus('statusNoPermission', 'error');
    } else if (event.error === 'no-speech') {
      // Auto-restart on no speech
      if (isListening) {
        try { recognition.start(); } catch(e) {}
      }
      return;
    } else if (event.error !== 'aborted') {
      setStatus('statusError', 'error');
    }
  };
  
  recognition.onend = () => {
    if (isListening) {
      // Auto-restart to keep listening
      try {
        recognition.lang = recognitionLang;
        recognition.start();
      } catch(e) {
        isListening = false;
        updateUI();
      }
    } else {
      updateUI();
    }
  };
}

function toggleListening() {
  if (!recognition) {
    initRecognition();
    if (!recognition) return;
  }
  
  if (isListening) {
    stopListening();
  } else {
    startListening();
  }
}

async function startListening() {
  // Initialize noise gate first
  await initNoiseGate();
  
  recognition.lang = recognitionLang;
  try {
    recognition.start();
    isListening = true;
    updateUI();
  } catch(e) {
    console.error('Start error:', e);
  }
}

function stopListening() {
  isListening = false;
  try {
    recognition.stop();
  } catch(e) {}
  removeInterim();
  stopNoiseGate();
  updateUI();
  
  // Auto-save if there are lines
  if (transcriptLines.length > 0) {
    saveToHistory();
  }
}

// ===== UI Updates =====
function updateUI() {
  const btn = document.getElementById('startBtn');
  const dot = document.getElementById('statusDot');
  const container = document.getElementById('transcriptContainer');
  const instruction = document.getElementById('instructionCard');
  const fontControl = document.getElementById('fontControl');
  
  if (isListening) {
    btn.className = 'start-btn listening';
    dot.className = 'status-dot active';
    setStatus('statusListening');
    container.classList.add('visible');
    instruction.style.display = 'none';
    fontControl.classList.add('visible');
  } else {
    btn.className = 'start-btn ready';
    dot.className = 'status-dot';
    if (transcriptLines.length > 0) {
      setStatus('statusStopped');
      container.classList.add('visible');
      fontControl.classList.add('visible');
    } else {
      setStatus('statusReady');
    }
  }
  
  updateButtonText();
  loadHistory();
}

function updateButtonText() {
  const btn = document.getElementById('startBtn');
  const t = i18n[currentLang];
  
  if (isListening) {
    btn.innerHTML = `<span class="sound-wave active"><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span></span> ${t.stopBtn}`;
  } else {
    btn.innerHTML = `<span class="btn-icon">🎙️</span> ${t.startBtn}`;
  }
}

function setStatus(key, type) {
  const text = document.getElementById('statusText');
  const dot = document.getElementById('statusDot');
  text.textContent = i18n[currentLang][key];
  
  if (type === 'error') {
    dot.className = 'status-dot error';
  }
}

// ===== Transcript Management =====
function addTranscriptLine(text, isFinal) {
  const time = new Date().toLocaleTimeString(currentLang === 'ja' ? 'ja-JP' : 'en-US', {
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit'
  });
  
  if (isFinal) {
    transcriptLines.push({ text, time });
  }
  
  renderTranscript();
  scrollToBottom();
}

function showInterim(text) {
  const body = document.getElementById('transcriptBody');
  const empty = document.getElementById('transcriptEmpty');
  
  if (empty) empty.style.display = 'none';
  
  if (!interimElement) {
    interimElement = document.createElement('div');
    interimElement.className = 'transcript-line interim';
    body.appendChild(interimElement);
  }
  
  interimElement.textContent = text;
  scrollToBottom();
}

function removeInterim() {
  if (interimElement) {
    interimElement.remove();
    interimElement = null;
  }
}

function renderTranscript() {
  const body = document.getElementById('transcriptBody');
  const empty = document.getElementById('transcriptEmpty');
  
  if (transcriptLines.length === 0) {
    if (empty) empty.style.display = '';
    return;
  }
  
  if (empty) empty.style.display = 'none';
  
  // Remove all final lines
  body.querySelectorAll('.transcript-line.final').forEach(el => el.remove());
  
  // Re-render
  const fragment = document.createDocumentFragment();
  transcriptLines.forEach(line => {
    const div = document.createElement('div');
    div.className = 'transcript-line final';
    div.style.fontSize = fontSizes[currentFontSize] + 'rem';
    div.innerHTML = `${line.text}<span class="timestamp">${line.time}</span>`;
    fragment.appendChild(div);
  });
  
  // Insert before interim element if it exists
  if (interimElement) {
    body.insertBefore(fragment, interimElement);
  } else {
    body.appendChild(fragment);
  }
}

function scrollToBottom() {
  const body = document.getElementById('transcriptBody');
  requestAnimationFrame(() => {
    body.scrollTop = body.scrollHeight;
  });
}

function copyTranscript() {
  if (transcriptLines.length === 0) return;
  
  const text = transcriptLines.map(l => `[${l.time}] ${l.text}`).join('\n');
  navigator.clipboard.writeText(text).then(() => {
    showToast(i18n[currentLang].copied);
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    showToast(i18n[currentLang].copied);
  });
}

function clearTranscript() {
  if (transcriptLines.length === 0) return;
  if (!confirm(i18n[currentLang].confirmClear)) return;
  
  transcriptLines = [];
  const body = document.getElementById('transcriptBody');
  body.querySelectorAll('.transcript-line').forEach(el => el.remove());
  const empty = document.getElementById('transcriptEmpty');
  if (empty) empty.style.display = '';
  
  showToast(i18n[currentLang].cleared);
}

// ===== Font Size =====
const fontSizes = [1.0, 1.35, 1.7, 2.1];
const fontLabels = { ja: ['小', '中', '大', '特大'], en: ['S', 'M', 'L', 'XL'] };
let currentFontSize = 1; // default medium

function changeFontSize(delta) {
  currentFontSize = Math.max(0, Math.min(fontSizes.length - 1, currentFontSize + delta));
  document.querySelectorAll('.transcript-line.final').forEach(el => {
    el.style.fontSize = fontSizes[currentFontSize] + 'rem';
  });
  updateFontLabel();
}

function updateFontLabel() {
  document.getElementById('fontLabel').textContent = fontLabels[currentLang][currentFontSize];
}

// ===== History / Local Storage =====
function saveToHistory() {
  if (transcriptLines.length === 0) return;
  
  const history = getHistory();
  const entry = {
    id: Date.now(),
    date: new Date().toISOString(),
    lang: currentLang,
    lines: [...transcriptLines]
  };
  
  history.unshift(entry);
  
  // Keep max 50 entries
  if (history.length > 50) history.length = 50;
  
  localStorage.setItem('koetomo_history', JSON.stringify(history));
  showToast(i18n[currentLang].saved);
  loadHistory();
}

function getHistory() {
  try {
    return JSON.parse(localStorage.getItem('koetomo_history') || '[]');
  } catch {
    return [];
  }
}

function loadHistory() {
  const history = getHistory();
  const section = document.getElementById('historySection');
  const list = document.getElementById('historyList');
  
  if (history.length === 0) {
    section.classList.remove('visible');
    return;
  }
  
  section.classList.add('visible');
  list.innerHTML = '';
  
  history.slice(0, 10).forEach(entry => {
    const date = new Date(entry.date);
    const dateStr = date.toLocaleDateString(currentLang === 'ja' ? 'ja-JP' : 'en-US', {
      month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
    });
    const preview = entry.lines.map(l => l.text).join(' ').slice(0, 80);
    
    const div = document.createElement('div');
    div.className = 'history-item';
    div.innerHTML = `
      <div class="history-meta">
        <span class="history-date">${dateStr}</span>
        <button class="history-delete" onclick="event.stopPropagation(); deleteHistory(${entry.id})">🗑️</button>
      </div>
      <div class="history-preview">${preview}...</div>
    `;
    div.onclick = () => showHistoryDetail(entry);
    list.appendChild(div);
  });
}

function deleteHistory(id) {
  if (!confirm(i18n[currentLang].confirmDelete)) return;
  
  let history = getHistory();
  history = history.filter(e => e.id !== id);
  localStorage.setItem('koetomo_history', JSON.stringify(history));
  loadHistory();
}

function showHistoryDetail(entry) {
  const date = new Date(entry.date);
  const dateStr = date.toLocaleDateString(currentLang === 'ja' ? 'ja-JP' : 'en-US', {
    year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
  });
  
  document.getElementById('modalTitle').textContent = dateStr;
  document.getElementById('modalContent').innerHTML = entry.lines.map(l => 
    `<div class="line">${l.text}<br><span class="line-time">${l.time}</span></div>`
  ).join('');
  
  document.getElementById('modalOverlay').classList.add('visible');
  document.getElementById('modal').classList.add('visible');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('visible');
  document.getElementById('modal').classList.remove('visible');
}

// ===== Toast =====
function showToast(message) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = message;
  toast.style.cssText = `
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--green-deep);
    color: white;
    padding: 12px 24px;
    border-radius: 50px;
    font-size: 0.9rem;
    font-weight: 700;
    z-index: 300;
    animation: fadeIn 0.3s;
    font-family: inherit;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  `;
  document.body.appendChild(toast);
  
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transition = 'opacity 0.3s';
    setTimeout(() => toast.remove(), 300);
  }, 2000);
}

// ===== PWA Install =====
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.add('visible');
});

function installPWA() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById('installBanner').classList.remove('visible');
    });
  }
}

function dismissInstall() {
  document.getElementById('installBanner').classList.remove('visible');
}

// ===== Init =====
document.addEventListener('DOMContentLoaded', () => {
  initRecognition();
  loadHistory();
  updateFontLabel();
  
  // iOS Safari detection for install hint
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
  if (isIOS && !isStandalone) {
    // Show iOS install hint
    const hint = document.querySelector('.hint-text');
    if (hint) {
      hint.innerHTML += '<br>📱 Safari の「共有」→「ホーム画面に追加」でアプリ化できます';
    }
  }
});

// Service Worker registration
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
